---
name: "Kubeconform"

on:
  pull_request:
    branches: ["main"]
    paths:
      - "kubernetes/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup kubeconform
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2
        with:
          version: "latest"

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | \
            tar xz -C /usr/local/bin kubeconform

      - name: Validate manifests
        run: |
          find kubernetes -name '*.yaml' -not -name '*.sops.yaml' -not -name 'kustomization.yaml' | \
            xargs -I {} kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location "https://kubernetes-schemas.pages.dev/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
              -output text \
              {}
