---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich
  interval: 1h
  values:
    controllers:
      immich-server:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
            env:
              IMMICH_PORT: "2283"
              DB_URL: "postgres://immich:immich@immich-postgres.media.svc.cluster.local:5432/immich"
              REDIS_HOSTNAME: "immich-redis.media.svc.cluster.local"
              IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning.media.svc.cluster.local:3003"
            ports:
              - name: http
                containerPort: 2283
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

      immich-machine-learning:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5
            ports:
              - name: http
                containerPort: 3003
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi

      immich-postgres:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 14-vectorchord0.4.3-pgvectors0.2.0
            env:
              POSTGRES_USER: immich
              POSTGRES_PASSWORD: immich
              POSTGRES_DB: immich
              POSTGRES_INITDB_ARGS: "--data-checksums"
            ports:
              - name: tcp-postgres
                containerPort: 5432
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

      immich-redis:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: "9"
            ports:
              - name: tcp-redis
                containerPort: 6379
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      immich-server:
        controller: immich-server
        ports:
          http:
            port: 2283
      immich-machine-learning:
        controller: immich-machine-learning
        ports:
          http:
            port: 3003
      immich-postgres:
        controller: immich-postgres
        ports:
          tcp-postgres:
            port: 5432
      immich-redis:
        controller: immich-redis
        ports:
          tcp-redis:
            port: 6379

    route:
      app:
        hostnames: ["photos.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: immich-server
                port: 2283

    persistence:
      library:
        type: nfs
        server: 192.168.1.196
        path: /var/nfs/shared/photos/Immich
        advancedMounts:
          immich-server:
            app:
              - path: /data
      postgres-data:
        type: hostPath
        hostPath: /var/mnt/appdata/immich/postgres
        hostPathType: DirectoryOrCreate
        advancedMounts:
          immich-postgres:
            app:
              - path: /var/lib/postgresql/data
      ml-cache:
        type: hostPath
        hostPath: /var/mnt/appdata/immich/ml-cache
        hostPathType: DirectoryOrCreate
        advancedMounts:
          immich-machine-learning:
            app:
              - path: /cache
