---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  values:
    crds:
      enabled: true
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 14d
        retentionSize: 10GB
        serviceMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
    alertmanager:
      alertmanagerSpec:
        replicas: 1
        storage:
          volumeClaimTemplate:
            spec:
              resources:
                requests:
                  storage: 1Gi
    grafana:
      envFromSecrets:
        - name: grafana-discord-webhook
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        alerts:
          enabled: true
          label: grafana_alert
          labelValue: "1"
          searchNamespace: ALL
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          trivy-operator:
            gnetId: 17813
            revision: 2
            datasource: Prometheus
          node-exporter-full:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          flux-cluster:
            gnetId: 16714
            revision: 1
            datasource: Prometheus
          cert-manager:
            gnetId: 20842
            revision: 3
            datasource: Prometheus
          coredns:
            gnetId: 15762
            revision: 18
            datasource: Prometheus
          cloudflare-tunnel:
            gnetId: 17457
            revision: 1
            datasource: Prometheus
      persistence:
        enabled: true
        size: 2Gi
      admin:
        existingSecret: kube-prometheus-stack-grafana-secret
        userKey: admin-user
        passwordKey: admin-password
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
    nodeExporter:
      enabled: true
    kubeStateMetrics:
      enabled: true
