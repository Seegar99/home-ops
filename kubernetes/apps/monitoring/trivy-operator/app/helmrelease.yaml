---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
spec:
  chartRef:
    kind: OCIRepository
    name: trivy-operator
  interval: 1h
  values:
    serviceMonitor:
      enabled: true
    trivy:
      ignoreUnfixed: true
    operator:
      infraAssessmentScannerEnabled: false
      clusterComplianceEnabled: false
      scanJobsConcurrentLimit: 1
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 512Mi
